databaseChangeLog:
  -  changeSet:
      id:  initial_tag_v0
      author:  pipeline_onboarding
      comment: "This tag will be used by the rollback by label functionality."
      labels: "initial_tag_v0,jira-0000"
      changes:
      -  tagDatabase:
          tag:  initial_tag_v0
          
  -  changeSet:
      id:  initial_tag_v1
      author:  pipeline_onboarding
      comment: "This tag will be replaced on the first pipeline run."
      labels: "initial_tag_v1,jira-0000"
      changes:
      -  tagDatabase:
          tag:  initial_tag_v1

  - includeAll:
      path: sequences
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false  

  - includeAll:
      path: tables
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false  

  - includeAll:
      path: views
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false

  - includeAll:
      path: materializedviews
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false

  - includeAll:
      path: dynamictables
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false
      
  - includeAll:
      path: procedures
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false

  - includeAll:
      path: functions
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false

  - includeAll:
      path: data
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false      
      
  - includeAll:
      path: issues
      relativeToChangelogFile: true
      errorIfMissingOrEmpty: false      
      
